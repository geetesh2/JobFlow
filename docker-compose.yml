services:
    postgres:
        image: postgres:17-alpine
        container_name: jobflow-postgres
        restart: unless-stopped

        environment:
            POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

        ports:
            - "5432:5432"

        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
            interval: 10s
            timeout: 5s
            retries: 10

        networks:
            - jobflow-network

    keycloak:
        image: quay.io/keycloak/keycloak:26.2
        container_name: jobflow-keycloak
        restart: unless-stopped

        command:
            - start-dev
            - --import-realm

        depends_on:
            postgres:
                condition: service_healthy

        environment:
            KC_DB: postgres
            KC_DB_URL_HOST: postgres
            KC_DB_URL_DATABASE: KeycloakDb
            KC_DB_USERNAME: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
            KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
            KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?Set KEYCLOAK_ADMIN in .env}
            KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}

        ports:
            - "8080:8080"

        volumes:
            - ./docker/keycloak/realm:/opt/keycloak/data/import

        healthcheck:
            test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
            interval: 15s
            timeout: 5s
            retries: 20

        networks:
            - jobflow-network

    redis:
        image: redis:8-alpine
        container_name: jobflow-redis
        restart: unless-stopped

        ports:
            - "6379:6379"

        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 10

        networks:
            - jobflow-network

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: jobflow-rabbitmq
        restart: unless-stopped

        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-jobflow}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-jobflow-local-rabbitmq-password}

        ports:
            - "5672:5672"
            - "15672:15672"

        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "status"]
            interval: 10s
            timeout: 5s
            retries: 10

        networks:
            - jobflow-network

    mongodb:
        image: mongo:7.0
        container_name: jobflow-mongodb
        restart: unless-stopped

        ports:
            - "27017:27017"

        volumes:
            - mongodb-data:/data/db

        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 10

        networks:
            - jobflow-network

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.2
        container_name: jobflow-elasticsearch
        restart: unless-stopped

        environment:
            discovery.type: single-node
            xpack.security.enabled: "false"
            ES_JAVA_OPTS: "-Xms512m -Xmx512m"

        ports:
            - "9200:9200"

        volumes:
            - elasticsearch-data:/usr/share/elasticsearch/data

        healthcheck:
            test:
                - CMD-SHELL
                - curl -fsS http://localhost:9200/_cluster/health || exit 1
            interval: 10s
            timeout: 5s
            retries: 12

        networks:
            - jobflow-network

    kibana:
        image: docker.elastic.co/kibana/kibana:8.11.2
        container_name: jobflow-kibana
        environment:
            - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
        ports:
            - "5601:5601"
        depends_on:
            elasticsearch:
                condition: service_healthy
        networks:
            - jobflow-network

    jaeger:
        image: jaegertracing/all-in-one:latest
        container_name: jobflow-jaeger
        ports:
            - "16686:16686"
            - "4317:4317"
        networks:
            - jobflow-network

    prometheus:
        image: prom/prometheus:latest
        container_name: jobflow-prometheus
        ports:
            - "9090:9090"
        volumes:
            - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        networks:
            - jobflow-network

    grafana:
        image: grafana/grafana:latest
        container_name: jobflow-grafana
        ports:
            - "3000:3000"
        networks:
            - jobflow-network

    jobflow-api:
        build:
            context: .
            dockerfile: src/JobFlow.Api/Dockerfile
        platform: linux/amd64
        container_name: jobflow-api
        ports:
            - "5274:8080"
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ConnectionStrings__JobFlowDb=Host=postgres;Port=5432;Database=JobFlowDb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            - Database__Password=${POSTGRES_PASSWORD}
            - Redis__Configuration=redis:6379
            - RabbitMq__Host=rabbitmq
            - RabbitMq__Username=${RABBITMQ_DEFAULT_USER:-jobflow}
            - RabbitMq__Password=${RABBITMQ_DEFAULT_PASS:-jobflow-local-rabbitmq-password}
            - MongoDb__ConnectionString=mongodb://mongodb:27017
            - Elasticsearch__Url=http://elasticsearch:9200
            - Authentication__Authority=http://keycloak:8080/realms/jobflow
            - Otlp__Endpoint=http://jaeger:4317
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            mongodb:
                condition: service_healthy
            elasticsearch:
                condition: service_healthy
        networks:
            - jobflow-network

    jobflow-worker:
        build:
            context: .
            dockerfile: src/JobFlow.Worker/Dockerfile
        platform: linux/amd64
        container_name: jobflow-worker
        volumes:
            - ./src/JobFlow.Worker/output:/app/output
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ConnectionStrings__JobFlowDb=Host=postgres;Port=5432;Database=JobFlowDb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            - Database__Password=${POSTGRES_PASSWORD}
            - Redis__Configuration=redis:6379
            - RabbitMq__Host=rabbitmq
            - RabbitMq__Username=${RABBITMQ_DEFAULT_USER:-jobflow}
            - RabbitMq__Password=${RABBITMQ_DEFAULT_PASS:-jobflow-local-rabbitmq-password}
            - MongoDb__ConnectionString=mongodb://mongodb:27017
            - Elasticsearch__Url=http://elasticsearch:9200
            - Authentication__Authority=http://keycloak:8080/realms/jobflow
            - Otlp__Endpoint=http://jaeger:4317
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            mongodb:
                condition: service_healthy
        networks:
            - jobflow-network

volumes:
    postgres-data:
        name: jobflow-postgres-data

    mongodb-data:
        name: jobflow-mongodb-data

    elasticsearch-data:
        name: jobflow-elasticsearch-data

networks:
    jobflow-network:
        driver: bridge
