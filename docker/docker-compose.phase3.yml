version: "3.8"

services:
    postgres:
        image: postgres:17-alpine
        container_name: jobflow-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - jobflow-network

    keycloak:
        image: quay.io/keycloak/keycloak:26.2
        container_name: jobflow-keycloak
        restart: unless-stopped
        command:
            - start-dev
            - --import-realm
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            KC_DB: postgres
            KC_DB_URL_HOST: postgres
            KC_DB_URL_DATABASE: KeycloakDb
            KC_DB_USERNAME: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
            KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
            KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?Set KEYCLOAK_ADMIN in .env}
            KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
        ports:
            - "8080:8080"
        volumes:
            - ./docker/keycloak/realm:/opt/keycloak/data/import
        healthcheck:
            test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
            interval: 15s
            timeout: 5s
            retries: 20
        networks:
            - jobflow-network

    redis:
        image: redis:8-alpine
        container_name: jobflow-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli ping"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - jobflow-network

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: jobflow-rabbitmq
        restart: unless-stopped
        ports:
            - "5672:5672"
            - "15672:15672"
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "status"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - jobflow-network

    mongodb:
        image: mongo:7.0.2
        container_name: jobflow-mongodb
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongodb-data:/data/db
        healthcheck:
            test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - jobflow-network

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.2
        container_name: jobflow-elasticsearch
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
        ports:
            - "9200:9200"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'curl -s http://localhost:9200/_cluster/health | grep -q ''"status":"green"'' || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 12
        networks:
            - jobflow-network

volumes:
    postgres-data:
    mongodb-data:

networks:
    jobflow-network:
        driver: bridge
